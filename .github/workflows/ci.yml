name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: showfreak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/showfreak_test
        run: npx prisma migrate deploy

      - name: Type check — backend
        working-directory: server
        run: npx tsc --noEmit

      - name: Type check — frontend
        working-directory: src
        run: npx tsc --noEmit

      - name: Test — backend
        working-directory: server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/showfreak_test
          JWT_SECRET: ci-test-secret-not-used-in-production
          JWT_EXPIRES_IN: 15m
          TMDB_API_KEY: test-key-mocked-in-tests
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
        run: npm test

      - name: Test — frontend
        working-directory: src
        run: npm test

      - name: Build — backend
        working-directory: server
        run: npm run build

      - name: Build — frontend
        working-directory: src
        env:
          VITE_API_URL: /api
        run: npm run build
